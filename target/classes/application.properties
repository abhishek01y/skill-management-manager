# ─── MongoDB Atlas ────────────────────────────────────────────────────────────
# Replace <username>, <password>, <cluster-url>, <dbname> with your Atlas values
# Example URI format:
# mongodb+srv://myuser:mypassword@cluster0.abc12.mongodb.net/resourcedb?retryWrites=true&w=majority
spring.data.mongodb.uri=mongodb+srv://Abhi1234:Abhi%401234@cluster0.qwk4mit.mongodb.net/officedb

# Database name (must match what's in the URI above)
spring.data.mongodb.database=officedb

# ─── Server ──────────────────────────────────────────────────────────────────
server.port=8080
spring.application.name=ResourceManagement

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.company.resourcemgmt=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG
